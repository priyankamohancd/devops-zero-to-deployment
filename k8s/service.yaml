apiVersion: v1
kind: Service
metadata:
  name: devops-starter-kit-service
  namespace: devops-starter-kit
  labels:
    app.kubernetes.io/name: devops-starter-kit-app
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: devops-starter-kit-app
  ports:
    - name: http
      port: 80
      targetPort: http
  externalTrafficPolicy: Cluster
